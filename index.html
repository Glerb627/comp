<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPILATION</title>
<style>
  :root {
    --theme-color: #00ffff; 
    --lime: #39ff14;
    --gold: #ffd700; 
    --cyan: #00e5ff;
    --orange: #ff6600;
    --hot-pink: #ff00aa;
  }

  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-color: #05010a;
    overflow: hidden;
    color: white;
    perspective: 1200px;
    cursor: crosshair;
    user-select: none;
  }

  body:active {
    cursor: grabbing;
  }

  #canvas-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* SURPRISE: Retro Scanlines */
  .scanlines {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 1;
  }

  /* SURPRISE: Breathing glow effect on the glass panel */
  @keyframes panelGlow {
    0% { box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.05), 0 0 15px rgba(255,255,255,0.1); }
    100% { box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.05), 0 0 40px var(--theme-color); }
  }

  .glass-panel {
    position: relative;
    z-index: 2;
    background: rgba(5, 2, 10, 0.25); 
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 40px;
    width: 750px;
    max-width: 90%;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.1s ease-out, box-shadow 0.2s ease;
    transform-style: preserve-3d;
    animation: panelGlow 3s infinite alternate ease-in-out;
  }

  .title-wrapper {
    position: relative;
    margin: 0 0 40px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* NEW: Top Warning Text */
  .top-warning {
    margin-top: 15px;
    font-size: 13px;
    color: var(--orange);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 0 8px rgba(255, 102, 0, 0.6);
  }

  /* SURPRISE: Reactive Title */
  h1 {
    margin: 0;
    font-weight: 900;
    letter-spacing: 12px;
    font-size: 4.5rem; 
    color: #fff;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 
      0 0 5px rgba(255,255,255,0.8),
      0 0 15px var(--theme-color),
      0 0 30px var(--theme-color);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  h1:hover {
    letter-spacing: 16px;
    transform: scale(1.02);
    text-shadow: 
      0 0 10px rgba(255,255,255,1),
      0 0 25px var(--theme-color),
      0 0 50px var(--theme-color);
  }

  /* SURPRISE: Interactive Splash Quote */
  .splash-quote {
    position: absolute;
    top: -15px;
    right: -80px; 
    color: #ffea00;
    font-weight: 900;
    font-size: 18px; 
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 10px rgba(255, 234, 0, 0.6);
    transform: rotate(-15deg);
    pointer-events: auto;
    cursor: crosshair;
    animation: splashBounce 0.4s infinite alternate ease-in-out;
    white-space: nowrap;
    transition: transform 0.2s;
  }

  .splash-quote:hover {
    animation: none;
    transform: scale(1.2) rotate(10deg);
    color: var(--theme-color);
    text-shadow: 1px 1px 0 #000, 0 0 15px var(--theme-color);
  }

  @keyframes splashBounce {
    0% { transform: scale(1) rotate(-15deg); }
    100% { transform: scale(1.05) rotate(-15deg); }
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    width: 100%;
    max-height: 55vh;
    overflow-y: auto;
    padding: 10px;
    transform: translateZ(25px);
  }
  .grid-container::-webkit-scrollbar { width: 0; }

  .place-btn {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #e0e0e0;
    padding: 18px;
    font-size: 18px; 
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 3px; 
    cursor: crosshair;
    border-radius: 8px;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    overflow: hidden;
  }

  .place-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s ease, height 0.4s ease;
    z-index: 0;
  }

  .place-btn:hover::before {
    width: 300px;
    height: 300px;
  }

  .place-btn > * {
    position: relative;
    z-index: 1;
  }

  .place-btn:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: var(--theme-color);
    color: #fff;
    box-shadow: 0 0 20px var(--theme-color), inset 0 0 10px var(--theme-color);
    transform: scale(1.02);
  }

  .place-btn.is-new { border-color: var(--lime); color: #fff; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); }
  .place-btn.is-new:hover { box-shadow: 0 0 25px rgba(57, 255, 20, 0.8), inset 0 0 10px rgba(57, 255, 20, 0.4); background: rgba(57, 255, 20, 0.1); }
  
  .place-btn.is-favorite { border-color: var(--gold); color: #fff; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
  .place-btn.is-favorite:hover { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8), inset 0 0 10px rgba(255, 215, 0, 0.4); background: rgba(255, 215, 0, 0.1); }
  
  .place-btn.is-classic { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); color: #fff; }
  .place-btn.is-classic:hover { box-shadow: 0 0 25px rgba(0, 229, 255, 0.6), inset 0 0 10px rgba(0, 229, 255, 0.3); background: rgba(0, 229, 255, 0.1); }
  
  .place-btn.is-hot { border-color: var(--orange); box-shadow: 0 0 15px rgba(255, 102, 0, 0.2); color: #fff; }
  .place-btn.is-hot:hover { box-shadow: 0 0 25px rgba(255, 102, 0, 0.6), inset 0 0 10px rgba(255, 102, 0, 0.3); background: rgba(255, 102, 0, 0.1); }
  
  .place-btn.is-creator { border-color: var(--hot-pink); box-shadow: 0 0 15px rgba(255, 0, 170, 0.2); color: #fff; }
  .place-btn.is-creator:hover { box-shadow: 0 0 25px rgba(255, 0, 170, 0.8), inset 0 0 10px rgba(255, 0, 170, 0.4); background: rgba(255, 0, 170, 0.1); }

  .mini-label {
    font-size: 11px;
    margin-bottom: 5px;
    letter-spacing: 1px;
    text-shadow: 0 0 8px currentColor;
    animation: pulseBadge 1.5s infinite alternate ease-in-out;
  }

  .status-working {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 6px;
    letter-spacing: 1px;
    font-weight: normal;
  }

  .place-btn:hover .status-working { color: rgba(255, 255, 255, 0.9); }

  /* NEW: Status Warning Styling */
  .status-warning {
    font-size: 11px;
    color: rgba(255, 102, 0, 0.6);
    margin-top: 6px;
    letter-spacing: 1px;
    font-weight: normal;
  }
  
  .place-btn:hover .status-warning { color: rgba(255, 102, 0, 1); }

  .test-tool { position: absolute; bottom: 20px; z-index: 10; opacity: 0.2; transition: opacity 0.3s; display: flex; gap: 10px; }
  .test-tool:hover { opacity: 1; }
  .test-input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-family: inherit; width: 200px; cursor: text;}
  .test-btn { background: #222; border: 1px solid #666; color: #fff; cursor: crosshair; padding: 0 15px; border-radius: 4px; font-family: inherit; transition: all 0.2s;}
  .test-btn:hover { background: var(--theme-color); color: #000; border-color: var(--theme-color); box-shadow: 0 0 15px var(--theme-color); }

</style>
</head>
<body>

  <canvas id="canvas-bg"></canvas>
  <div class="scanlines"></div>

  <div class="glass-panel" id="tilt-panel">
    <div class="title-wrapper">
      <h1 id="main-title">COMPILATION</h1>
      <div class="splash-quote" id="splash-text"></div>
      <div class="top-warning">if you visit these sites without using compilation they wont work when you try again</div>
    </div>
    <div class="grid-container" id="menu"></div>
  </div>

  <div class="test-tool">
    <input type="text" id="testUrl" class="test-input" placeholder="URL to Hex">
    <button onclick="testLink()" class="test-btn">ENCODE</button>
  </div>

  <script>
    const quotes = [
      "100% legal",
      "Also try Opera GX",
      "Never leave your pie in for too long",
      "Remember the good old days",
      "RIP Sweet Tea",
      "JC>CC",
      "T-cubed",
      "Takis! Takis! Takis!",
      "does anyone even read these?",
      "Lafayette B.",
      "No Oil rigs here",
      "say grenade 10 times fast",
      "2-Crack, Plumbous, Rodrick, Slopadopalis",
      "BLEHELEHEHHEEHH",
      "Stay Strong Showtime Abdul Al Baker",
      "Apple pie is good",
      "time to get some stuff done",
      "Travis or Youngboy?",
      "This site has 1.3K views as of Feb 26",
      "are you rushing or are you dragging?",
      "Not quite my tempo...",
      "That's my tempo..."
    ];
    document.getElementById('splash-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    const places = [
      { label: "PIE PLACE 01", hex: "68747470733a2f2f736f6469756d2d3568382e70616765732e646576", isClassic: true, warning: true },
      { label: "PIE PLACE 02", hex: "68747470733a2f2f737a2d67616d65732e6769746875622e696f", isHot: true }, 
      { label: "PIE PLACE 03", hex: "68747470733a2f2f73796e61707365636f72702e70616765732e6465762f", warning: true }, 
      { label: "PIE PLACE 04", hex: "68747470733a2f2f666f72742e726569646368616c66696e2e776f726b6572732e646576", isFavorite: true },
      { label: "PIE PLACE 05", hex: "68747470733a2f2f676168323232322e6769746875622e696f2f4e6f6f62732f" }, 
      { label: "PIE PLACE 06", hex: "68747470733a2f2f676c6572623632372e6769746875622e696f2f736177352e392e352f", isCreator: true, isWiped: true },
      { label: "PIE TEST SITE 01", hex: "68747470733a2f2f676c6572623632372e6769746875622e696f2f706f6b65322e312f", isTestSite: true }
    ];

    const menu = document.getElementById('menu');
    const panel = document.getElementById('tilt-panel');

    places.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'place-btn';
      
      let topLabel = '';
      let bottomLabel = '';

      if (p.isNew) {
        btn.classList.add('is-new');
        topLabel = `<span class="mini-label" style="color: var(--lime);">► NEW! ◄</span>`;
      }
      if (p.isWiped) {
        btn.classList.add('is-new'); 
        topLabel = `<span class="mini-label" style="color: var(--hot-pink);">► BOARDS WIPED ◄</span>`;
      }
      if (p.isClassic) btn.classList.add('is-classic');
      if (p.isHot) btn.classList.add('is-hot');

      if (p.isFavorite) {
        btn.classList.add('is-favorite');
        topLabel = `<span class="mini-label" style="color: var(--gold);">★ FAVORITE ★</span>`;
      }
      
      if (p.isCreator) {
        btn.classList.add('is-creator');
        bottomLabel = `<div style="font-size: 10px; color: var(--hot-pink); margin-top: 4px; letter-spacing: 1px;">MADE BY MEOWMASTER</div>`;
      }

      if (p.isTestSite) {
        btn.classList.add('is-creator'); // Fits the "I made" vibe
        bottomLabel += `<div style="font-size: 9px; color: #ff00aa; margin-top: 6px; letter-spacing: 0.5px; line-height: 1.2; text-align: center;">just a little something I made, kinda buggy and not 100% working right now</div>`;
      }
      
      let statusHtml = p.warning 
        ? `<span class="status-warning">sometimes doesn't work</span>`
        : `<span class="status-working">working</span>`;

      // Hide default status text if it's a custom test site to keep it clean
      if (p.isTestSite) statusHtml = '';

      btn.innerHTML = `${topLabel}<span>${p.label}</span>${bottomLabel}${statusHtml}`;
      
      btn.onclick = () => initSession(p.hex);
      menu.appendChild(btn);
    });

    document.addEventListener('mousemove', (e) => {
      let xAxis = (window.innerWidth / 2 - e.pageX) / 150; 
      let yAxis = (window.innerHeight / 2 - e.pageY) / -150;
      panel.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
    
    document.addEventListener('mouseleave', () => {
      panel.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });

    function initSession(h) {
      let u = '';
      for (let i = 0; i < h.length; i += 2) u += String.fromCharCode(parseInt(h.substr(i, 2), 16));
      launch(u);
    }

    function testLink() {
      const url = document.getElementById('testUrl').value;
      if(!url) return;
      let hex = '';
      for(let i=0;i<url.length;i++) hex += url.charCodeAt(i).toString(16);
      launch(url);
    }

    function launch(url) {
      const id = Math.floor(Math.random() * 100000);
      const sep = url.includes('?') ? '&' : '?';
      const target = `${url}${sep}session=${id}`;

      const currentColor = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();

      const greetings = ["good luck", "have fun", "Goodbye", "See ya"];
      const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];

      const w = window.open('about:blank', '_blank');
      if (w) {
        w.document.write(`
          <style>
            html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100vw; height: 100vh; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; }
            
            .msg { font-size: 36px; font-weight: bold; z-index: 10; animation: float 2s infinite alternate ease-in-out; text-align: center; transition: opacity 0.5s ease; text-shadow: 0 0 15px ${currentColor}, 0 0 30px ${currentColor}; pointer-events: none; }
            .sub { font-size: 18px; color: rgba(255,255,255,0.8); margin-top: 15px; text-shadow: none; pointer-events: none; }
            @keyframes float { 0% { transform: translateY(-5px); } 100% { transform: translateY(5px); } }
            
            iframe { 
              display: block; width: 100vw; height: 100vh; border: none; margin: 0; padding: 0; position: absolute; top: 0; left: 0; 
              z-index: 3; 
              background: #000; 
              opacity: 0; 
              transform: scale(0.01); 
              transition: transform 0.65s cubic-bezier(0.1, 1, 0.2, 1), opacity 0.3s ease-out; 
            }
            canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; transition: opacity 1.5s ease-in-out; }
          </style>
          
          <canvas id="warpCanvas"></canvas>
          <iframe id="frm" src="${target}" allowfullscreen sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"></iframe>
          <div class="msg" id="ldr">${randomGreeting}<div class="sub">-Meowmaster</div></div>
          
          <script>
            const wc = document.getElementById('warpCanvas');
            const wctx = wc.getContext('2d');
            let stars = [];
            wc.width = window.innerWidth; wc.height = window.innerHeight;
            
            for(let i=0; i<600; i++) {
              stars.push({
                x: Math.random()*wc.width-wc.width/2, 
                y: Math.random()*wc.height-wc.height/2, 
                z: Math.random()*wc.width,
                pz: Math.random()*wc.width 
              });
            }
            
            let speed = 0.5;
            let animationFrameId;
            let isTransitioning = false;

            function animateWarp() {
              speed += 0.2 + (speed * 0.025); 
              
              if (speed > 130 && !isTransitioning) {
                isTransitioning = true;
                
                document.getElementById('ldr').style.opacity = '0';
                
                const frame = document.getElementById('frm');
                frame.style.opacity = '1';
                frame.style.transform = 'scale(1)';
                
                setTimeout(() => { wc.style.opacity = '0'; }, 800);
                setTimeout(() => { cancelAnimationFrame(animationFrameId); }, 2500);
              }

              wctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
              wctx.fillRect(0,0,wc.width,wc.height);
              
              let cx = wc.width/2; let cy = wc.height/2;
              
              for(let i=0; i<stars.length; i++) {
                stars[i].pz = stars[i].z; 
                stars[i].z -= speed;
                
                if(stars[i].z <= 1) { 
                  stars[i].z = wc.width; 
                  stars[i].pz = wc.width;
                  stars[i].x = Math.random()*wc.width-wc.width/2;
                  stars[i].y = Math.random()*wc.height-wc.height/2;
                }
                
                let sx = (stars[i].x / stars[i].z) * wc.width + cx;
                let sy = (stars[i].y / stars[i].z) * wc.width + cy;
                
                let px = (stars[i].x / stars[i].pz) * wc.width + cx;
                let py = (stars[i].y / stars[i].pz) * wc.width + cy;
                
                wctx.beginPath();
                wctx.moveTo(px, py);
                wctx.lineTo(sx, sy);
                wctx.lineWidth = Math.max(0.5, (1 - stars[i].z/wc.width) * 4);
                wctx.strokeStyle = (i % 4 === 0) ? '${currentColor}' : '#ffffff'; 
                wctx.stroke();
              }

              if (!isTransitioning || wc.style.opacity !== '0') {
                animationFrameId = requestAnimationFrame(animateWarp);
              }
            }
            animateWarp();
          <\/script>
        `);
        w.document.close();
      }
    }

    // MAIN PHYSICS ENGINE
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];
    let ripplesArray = []; 
    
    let globalHue = 180; 
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: null, y: null };
    let isLeftMouseDown = false;
    let isRightMouseDown = false;
    let isTimeFrozen = false; 
    let isOvercharged = false; 

    window.addEventListener('mousemove', function(e) { mouse.x = e.x; mouse.y = e.y; });
    window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; isLeftMouseDown = false; isRightMouseDown = false;});
    
    window.addEventListener('mousedown', (e) => { 
      if (e.button === 0) isLeftMouseDown = true; 
      if (e.button === 2) isRightMouseDown = true;
    });
    window.addEventListener('contextmenu', e => e.preventDefault());

    window.addEventListener('keydown', (e) => { 
      if (e.code === 'Space') isTimeFrozen = true; 
      if (e.key === 'Shift') isOvercharged = true; 
    });
    window.addEventListener('keyup', (e) => { 
      if (e.code === 'Space') isTimeFrozen = false; 
      if (e.key === 'Shift') isOvercharged = false; 
    });

    // SURPRISE EASTER EGG: Overcharge burst on title double click
    document.getElementById('main-title').addEventListener('dblclick', (e) => {
      isOvercharged = true;
      setTimeout(() => isOvercharged = false, 1500);
      for(let i=0; i<15; i++) {
        setTimeout(() => {
          ripplesArray.push(new Ripple(window.innerWidth/2, window.innerHeight/2 - 150, true, '#ff00aa'));
        }, i * 100);
      }
    });

    window.addEventListener('mouseup', (e) => { 
      if (e.button === 0) {
        isLeftMouseDown = false; 
        if (mouse.x === undefined || mouse.y === undefined) return;
        
        ripplesArray.push(new Ripple(mouse.x, mouse.y, true, `hsl(${globalHue}, 100%, 50%)`)); 

        for (let i = 0; i < particlesArray.length; i++) {
          let dx = particlesArray[i].x - mouse.x;
          let dy = particlesArray[i].y - mouse.y;
          let distance = Math.sqrt(dx*dx + dy*dy);
          if (distance < 400) { 
            let force = (400 - distance) / 6; 
            let dirX = dx / distance;
            let dirY = dy / distance;
            particlesArray[i].vx += dirX * force;
            particlesArray[i].vy += dirY * force;
          }
        }
      }
      if (e.button === 2) {
        isRightMouseDown = false;
        ripplesArray.push(new Ripple(mouse.x, mouse.y, true, '#ff00aa')); 
      }
    });

    class Ripple {
      constructor(x, y, isMega = false, colorStr) {
        this.x = x; this.y = y; 
        this.radius = 10; 
        this.alpha = 1; 
        this.colorStr = colorStr;
        this.lineWidth = isMega ? 20 : 8;
        this.expansionRate = isMega ? 30 : 15;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        
        let hslMatch = this.colorStr.match(/\d+/g);
        if(hslMatch && hslMatch.length >= 3) {
           ctx.strokeStyle = `hsla(${hslMatch[0]}, ${hslMatch[1]}%, ${hslMatch[2]}%, ${this.alpha})`;
        } else {
           ctx.strokeStyle = `rgba(255, 0, 170, ${this.alpha})`; 
        }
        
        ctx.lineWidth = this.lineWidth;
        ctx.shadowBlur = 30;
        ctx.shadowColor = this.colorStr;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      update() {
        let timeScale = isTimeFrozen ? 0.1 : 1;
        this.radius += this.expansionRate * timeScale; 
        this.alpha -= (0.1 * timeScale); 
        this.lineWidth *= (1 - (0.08 * timeScale)); 
      }
    }

    class Particle {
      constructor(x, y, vx, vy, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.baseVx = vx; this.baseVy = vy;
        this.size = size; 
        this.hueOffset = (Math.random() * 40) - 20; 
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
        
        let myHue = globalHue + this.hueOffset;
        let fillStyle = isOvercharged ? '#ff00aa' : `hsl(${myHue}, 100%, 50%)`;
        
        ctx.fillStyle = fillStyle;
        ctx.shadowBlur = isOvercharged ? 25 : 15;
        ctx.shadowColor = fillStyle;
        ctx.fill();
        ctx.shadowBlur = 0; 
      }
      update() {
        if (this.x + this.size > canvas.width || this.x - this.size < 0) {
          this.vx = -this.vx; this.baseVx = -this.baseVx;
          if(this.x < 0) this.x = this.size; else this.x = canvas.width - this.size;
        }
        if (this.y + this.size > canvas.height || this.y - this.size < 0) {
          this.vy = -this.vy; this.baseVy = -this.baseVy;
          if(this.y < 0) this.y = this.size; else this.y = canvas.height - this.size;
        }

        if (isOvercharged) {
          this.vx += (Math.random() - 0.5) * 5;
          this.vy += (Math.random() - 0.5) * 5;
        }

        if(mouse.x != undefined && mouse.y != undefined) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx*dx + dy*dy);
          
          if (distance < 600) {
            let dirX = dx / distance;
            let dirY = dy / distance;
            let force = (600 - distance) / 600; 

            if (isLeftMouseDown) {
              this.vx += dirX * force * 6;
              this.vy += dirY * force * 6;
              this.vx += dirY * force * 2.5;
              this.vy -= dirX * force * 2.5;
              
              if (distance < 50) {
                this.vx *= 0.2; 
                this.vy *= 0.2; 
                this.x += (mouse.x - this.x) * 0.15; 
                this.y += (mouse.y - this.y) * 0.15; 
              }
            } else if (isRightMouseDown) {
              this.vx -= dirX * force * 4;
              this.vy -= dirY * force * 4;
            } else if (distance < 120 && !isOvercharged) {
              let hoverForce = (120 - distance) / 120;
              this.vx -= dirX * hoverForce * 0.5;
              this.vy -= dirY * hoverForce * 0.5;
            }
          }
        }

        let currentSpeedSq = this.vx * this.vx + this.vy * this.vy;
        let baseSpeedSq = this.baseVx * this.baseVx + this.baseVy * this.baseVy;

        if (currentSpeedSq > baseSpeedSq * 2 && !isLeftMouseDown && !isRightMouseDown && !isOvercharged) {
          this.vx *= 0.93; 
          this.vy *= 0.93;
        } else if (!isLeftMouseDown && !isRightMouseDown && !isOvercharged) {
          this.vx += (this.baseVx - this.vx) * 0.02;
          this.vy += (this.baseVy - this.vy) * 0.02;
        }

        let timeScale = isTimeFrozen ? 0.05 : 1;
        this.x += this.vx * timeScale; 
        this.y += this.vy * timeScale;
        
        this.draw();
      }
    }

    function initParticles() {
      particlesArray = [];
      let numberOfParticles = (canvas.height * canvas.width) / 8000; 
      for (let i = 0; i < numberOfParticles; i++) {
        let size = (Math.random() * 3) + 2; 
        let x = Math.random() * (innerWidth - size * 2) + size;
        let y = Math.random() * (innerHeight - size * 2) + size;
        let vx = (Math.random() * 2) - 1; 
        let vy = (Math.random() * 2) - 1;
        particlesArray.push(new Particle(x, y, vx, vy, size));
      }
    }

    function connectParticles() {
      let baseHue = isTimeFrozen ? 50 : (isOvercharged ? 320 : globalHue);
      let sat = isTimeFrozen ? "100%" : "100%";
      let light = isTimeFrozen ? "50%" : "60%";

      for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
          let dx = particlesArray[a].x - particlesArray[b].x;
          let dy = particlesArray[a].y - particlesArray[b].y;
          let distance = dx*dx + dy*dy;
          
          let connectionLimit = isOvercharged ? 25000 : 15000;
          
          if (distance < connectionLimit) {
            let opacityValue = 1 - (distance / connectionLimit);
            ctx.strokeStyle = `hsla(${baseHue}, ${sat}, ${light}, ${opacityValue * (isOvercharged ? 1 : 0.8)})`; 
            ctx.lineWidth = isTimeFrozen ? 3 : (isOvercharged ? 2.5 : 2); 
            ctx.beginPath();
            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
            ctx.stroke();
          }
        }
      }
    }

    function drawVortexCore() {
      if ((isLeftMouseDown || isRightMouseDown) && mouse.x != undefined) {
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 40;
        ctx.shadowColor = isRightMouseDown ? '#ff00aa' : `hsl(${globalHue}, 100%, 50%)`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function animateParticles() {
      requestAnimationFrame(animateParticles);
      
      globalHue += 0.15;
      if (globalHue >= 360) globalHue = 0;
      document.documentElement.style.setProperty('--theme-color', `hsl(${globalHue}, 100%, 50%)`);
      
      if (isTimeFrozen || isOvercharged) {
        ctx.fillStyle = isOvercharged ? 'rgba(20, 0, 10, 0.25)' : 'rgba(5, 1, 10, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      for (let i = ripplesArray.length - 1; i >= 0; i--) {
        ripplesArray[i].update(); ripplesArray[i].draw();
        if (ripplesArray[i].alpha <= 0.05) ripplesArray.splice(i, 1);
      }

      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
      }
      
      connectParticles();
      drawVortexCore();
    }

    window.addEventListener('resize', function() {
      canvas.width = innerWidth; canvas.height = innerHeight;
      initParticles();
    });

    initParticles(); animateParticles();
  </script>
</body>
</html>
